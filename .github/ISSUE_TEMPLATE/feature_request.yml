name: Feature Request
description: Suggest an idea for gone
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **Before opening:** read the "Ground rules" in [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md). `gone` is intentionally small, macOS-only, and filesystem-scanning (no curated app databases).
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain, not the solution. Real-world context helps.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work from a user's perspective?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: This feature aligns with gone's scope (macOS-only, filesystem-scanning, Trash-based, small surface area)
          required: true
        - label: I searched existing issues and this is not a duplicate
          required: true
